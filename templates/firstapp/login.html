<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #4facfe, #00f2fe, #2c3e50, #3498db);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            padding: 20px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 45px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-badge {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 32px;
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
        }

        .login-title {
            font-weight: 700;
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 4px;
        }

        .login-subtitle {
            color: #8a94a6;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .input-group-text {
            background: #f7f9fc;
            border: 1.5px solid #e2e8f0;
            border-right: none;
            color: #94a3b8;
        }

        .form-control {
            border: 1.5px solid #e2e8f0;
            border-left: none;
            padding: 11px 14px;
            font-size: 14px;
        }

        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: #3498db;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #3498db;
        }

        .forgot-link {
            font-size: 13px;
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-login {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            border: none;
            padding: 12px;
            font-weight: 600;
            font-size: 15px;
            border-radius: 10px;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.4);
            color: #fff;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #cbd5e0;
            font-size: 12px;
            margin: 24px 0 18px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        .divider:not(:empty)::before { margin-right: .75em; }
        .divider:not(:empty)::after { margin-left: .75em; }

        .register-text {
            text-align: center;
            font-size: 14px;
            color: #8a94a6;
        }

        .register-link {
            color: #2c3e50;
            font-weight: 700;
            text-decoration: none;
        }
        .register-link:hover {
            color: #3498db;
        }

        .alert {
            border-radius: 10px;
            font-size: 14px;
            padding: 12px 16px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="text-center">
                <div class="icon-badge">🎓</div>
                <div class="login-title">Student Management</div>
                <div class="login-subtitle">Sign in to continue to your dashboard</div>
            </div>

            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-danger d-flex align-items-center gap-2">
                    <i class="bi bi-exclamation-circle-fill"></i> {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">USERNAME</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="mb-2">
                    <label class="form-label">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="d-flex justify-content-end mb-4">
                    <a href="{% url 'password_reset' %}" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>

                <div class="divider">or</div>

                <p class="register-text mb-0">
                    Don't have an account?
                    <a href="{% url 'register' %}" class="register-link">Register here</a>
                </p>
            </form>

        </div>
    </div>

</body>
</html>
