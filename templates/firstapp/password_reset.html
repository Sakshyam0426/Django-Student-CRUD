<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .form-control { border-radius: 0 6px 6px 0; }
    </style>
</head>
<body>
    <div class="card-box">

        <div class="text-center mb-4">
            <i class="bi bi-lock-fill" style="font-size:48px; color:#3498db;"></i>
            <h4 class="fw-bold mt-2">Forgot Password?</h4>
            <p class="text-muted">Enter your email and we will send you a reset link.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control"
                           placeholder="Enter your registered email" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="bi bi-send"></i> Send Reset Link
            </button>

            <p class="text-center text-muted mb-0">
                Remember your password?
                <a href="{% url 'login' %}" class="text-primary fw-bold">Login here</a>
            </p>
        </form>
    </div>
</body>
</html>
