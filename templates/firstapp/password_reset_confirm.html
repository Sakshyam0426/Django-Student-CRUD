<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set New Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .form-control { border-radius: 0 6px 6px 0; }
    </style>
</head>
<body>
    <div class="card-box">

        <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill" style="font-size:48px; color:#3498db;"></i>
            <h4 class="fw-bold mt-2">Set New Password</h4>
            <p class="text-muted">Enter your new password below.</p>
        </div>

        {% if validlink %}
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="new_password1" class="form-control"
                           placeholder="Enter new password" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm New Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="new_password2" class="form-control"
                           placeholder="Confirm new password" required>
                </div>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger">
                {{ form.errors }}
            </div>
            {% endif %}

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-check-circle"></i> Reset Password
            </button>
        </form>
        {% else %}
        <div class="alert alert-danger text-center">
            <i class="bi bi-x-circle-fill"></i>
            This reset link is invalid or has expired.
        </div>
        <a href="{% url 'password_reset' %}" class="btn btn-primary w-100">
            <i class="bi bi-arrow-repeat"></i> Request New Link
        </a>
        {% endif %}
    </div>
</body>
</html>
